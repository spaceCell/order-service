server:
  port: 8081

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  rabbitmq:
    username: admin
    password: admin
    addresses: amqp://localhost:5672

clients:
  payment-service:
    url: http://localhost:8082

rabbitmq:
  payment:
    exchange-request-name: payment-request-exchange
    queue-request-name: payment-request-queue
    exchange-result-name: payment-result-exchange
    queue-result-name: payment-result-queue

resilience4j:
  retry:
    instances:
      paymentServiceRetry:
        maxAttempts: 3
        waitDuration: 500ms
        retryExceptions:
          - feign.FeignException
        ignoreExceptions:
          - java.lang.RuntimeException

  ratelimiter:
    instances:
      paymentClientRateLimiter:
        limitForPeriod: 10
        limitRefreshPeriod: 1s
        timeoutDuration: 0s

  bulkhead:
    instances:
      paymentClientBulkhead:
        maxConcurrentCalls: 5
        maxWaitDuration: 0s

  circuitbreaker:
    instances:
      paymentServiceCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        minimumNumberOfCalls: 5
        recordExceptions:
          - feign.FeignException
        ignoreExceptions:
          - java.lang.RuntimeException
      orderServiceCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        minimumNumberOfCalls: 5

logging:
  level:
    io.github.resilience4j: DEBUG
